name: Fetch Zosimus public-domain source

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch and parse source
        run: |
          python -m pip install --quiet requests beautifulsoup4 lxml
          python - <<'PY'
          from pathlib import Path
          import json, re, requests, traceback
          from bs4 import BeautifulSoup

          out=Path('zosimus-source'); out.mkdir(exist_ok=True)
          headers={'User-Agent':'Mozilla/5.0 (compatible; Zyel Publishing source preservation/1.0)'}
          debug={'attempts':[]}

          def fetch(url,name,timeout=120):
              try:
                  r=requests.get(url,headers=headers,timeout=timeout)
                  debug['attempts'].append({'url':url,'status':r.status_code,'bytes':len(r.content),'content_type':r.headers.get('content-type')})
                  (out/name).write_bytes(r.content)
                  r.raise_for_status()
                  return r
              except Exception as e:
                  debug['attempts'].append({'url':url,'error':repr(e)})
                  return None

          books={str(i):[] for i in range(1,7)}
          source_used=None

          # First choice: the clean complete archival transcription.
          tianmu='https://tianmu.org/good-work-library/scythian/greek-and-roman-sources/zosimus-new-history-complete-archival-english-text'
          r=fetch(tianmu,'tianmu-page.html')
          if r is None:
              r=fetch('https://r.jina.ai/http://tianmu.org/good-work-library/scythian/greek-and-roman-sources/zosimus-new-history-complete-archival-english-text','tianmu-jina.txt')
          if r is not None:
              soup=BeautifulSoup(r.text,'lxml')
              article=soup.find('article') or soup.find('main') or soup
              start=article.find(lambda tag: tag.name in ['h2','h3'] and re.fullmatch(r'Book\s*1',tag.get_text(' ',strip=True),re.I))
              if start:
                  current=None
                  for el in start.find_all_next(['h2','h3','h4','p','blockquote','li']):
                      text=re.sub(r'\s+',' ',el.get_text(' ',strip=True)).strip()
                      m=re.fullmatch(r'Book\s*([1-6])',text,re.I)
                      if m: current=m.group(1); continue
                      if re.fullmatch(r'Colophon',text,re.I): break
                      if current and el.name in ['p','blockquote','li'] and text:
                          books[current].append(text)
                  if all(len(' '.join(v).split())>500 for v in books.values()):
                      source_used='tianmu'

          # Fallback: Roger Pearse's six public-domain transcription pages.
          if source_used is None:
              books={str(i):[] for i in range(1,7)}
              for n in range(1,7):
                  url=f'https://www.tertullian.org/fathers/zosimus0{n}_book{n}.htm'
                  rr=fetch(url,f'tertullian-book-{n}.html')
                  if rr is None:
                      continue
                  ss=BeautifulSoup(rr.text,'lxml')
                  body=ss.find('body') or ss
                  for bad in body.find_all(['script','style','nav','header','footer']): bad.decompose()
                  # Start after the BOOK heading where possible; stop at navigation/editorial footer.
                  start=body.find(lambda tag: tag.name in ['h1','h2','h3','center','b'] and re.search(rf'BOOK\s*(THE\s*)?(FIRST|SECOND|THIRD|FOURTH|FIFTH|SIXTH|{n})',tag.get_text(' ',strip=True),re.I))
                  scope=start.find_all_next(['p','blockquote']) if start else body.find_all(['p','blockquote'])
                  ps=[]
                  for p in scope:
                      text=re.sub(r'\s+',' ',p.get_text(' ',strip=True)).strip()
                      low=text.lower()
                      if not text: continue
                      if any(low.startswith(x) for x in ['return to','zosimus index','book index','site navigation','this text was transcribed']):
                          continue
                      if 'tertullian.org' in low and len(text)<250: continue
                      ps.append(text)
                  books[str(n)]=ps
              if all(len(' '.join(v).split())>500 for v in books.values()): source_used='tertullian'

          stats={}
          for n,ps in books.items():
              text='\n\n'.join(ps).strip()+'\n'
              (out/f'book-{n}.txt').write_text(text,encoding='utf-8')
              stats[n]={'words':len(text.split()),'paragraphs':len(ps)}
          complete='\n\n'.join(f'BOOK {n}\n\n'+(out/f'book-{n}.txt').read_text(encoding='utf-8').strip() for n in books)+'\n'
          (out/'zosimus-complete-1814.txt').write_text(complete,encoding='utf-8')

          # Internet Archive scan lineage and OCR.
          ia='historyofcountzo00zosiuoft'
          meta=fetch(f'https://archive.org/metadata/{ia}','internet-archive-metadata.json')
          ocr=fetch(f'https://archive.org/download/{ia}/{ia}_djvu.txt','internet-archive-djvu.txt',180)

          report={'source_used':source_used,'source_url':tianmu,'ia_id':ia,'books':stats,'complete_words':len(complete.split()),'debug':debug}
          (out/'SOURCE_ACQUISITION_REPORT.json').write_text(json.dumps(report,indent=2),encoding='utf-8')
          print(json.dumps(report,indent=2))
          if source_used is None:
              raise RuntimeError('No complete six-book source extraction succeeded; see source artifact diagnostics.')
          PY
      - name: Upload source artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zosimus-source
          path: zosimus-source
      - name: Commit fetched source on push/manual runs
        if: github.event_name != 'pull_request' && success()
        run: |
          git config user.name 'Zyel Source Bot'
          git config user.email 'source-bot@zyel.io'
          git add zosimus-source
          git commit -m 'Fetch Zosimus 1814 public-domain source' || exit 0
          git push
