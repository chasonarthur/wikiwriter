name: Fetch Zosimus public-domain source

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch and parse source
        run: |
          python -m pip install --quiet requests beautifulsoup4 lxml
          python - <<'PY'
          from pathlib import Path
          import json, re, requests
          from bs4 import BeautifulSoup
          out=Path('zosimus-source'); out.mkdir(exist_ok=True)
          headers={'User-Agent':'Zyel Publishing source preservation/1.0'}
          url='https://tianmu.org/good-work-library/scythian/greek-and-roman-sources/zosimus-new-history-complete-archival-english-text'
          r=requests.get(url,headers=headers,timeout=90); r.raise_for_status()
          (out/'tianmu-page.html').write_bytes(r.content)
          soup=BeautifulSoup(r.text,'lxml')
          article=soup.find('article') or soup.find('main') or soup
          start=article.find(lambda tag: tag.name in ['h2','h3'] and re.fullmatch(r'Book\s*1',tag.get_text(' ',strip=True),re.I))
          if not start: raise RuntimeError('Book 1 heading not found')
          books={str(i):[] for i in range(1,7)}; current=None
          for el in start.find_all_next(['h2','h3','h4','p','blockquote','li']):
              text=re.sub(r'\s+',' ',el.get_text(' ',strip=True)).strip()
              m=re.fullmatch(r'Book\s*([1-6])',text,re.I)
              if m: current=m.group(1); continue
              if re.fullmatch(r'Colophon',text,re.I): break
              if current and el.name in ['p','blockquote','li'] and text: books[current].append(text)
          stats={}
          for n,ps in books.items():
              text='\n\n'.join(ps).strip()+'\n'
              if len(text.split())<500: raise RuntimeError(f'Book {n} too short: {len(text.split())}')
              (out/f'book-{n}.txt').write_text(text,encoding='utf-8')
              stats[n]={'words':len(text.split()),'paragraphs':len(ps)}
          complete='\n\n'.join(f'BOOK {n}\n\n'+(out/f'book-{n}.txt').read_text(encoding='utf-8').strip() for n in books)+'\n'
          (out/'zosimus-complete-1814.txt').write_text(complete,encoding='utf-8')
          ia='historyofcountzo00zosiuoft'
          meta=requests.get(f'https://archive.org/metadata/{ia}',headers=headers,timeout=90); meta.raise_for_status()
          (out/'internet-archive-metadata.json').write_text(json.dumps(meta.json(),indent=2),encoding='utf-8')
          ocr=requests.get(f'https://archive.org/download/{ia}/{ia}_djvu.txt',headers=headers,timeout=180); ocr.raise_for_status()
          (out/'internet-archive-djvu.txt').write_bytes(ocr.content)
          (out/'SOURCE_ACQUISITION_REPORT.json').write_text(json.dumps({'source_url':url,'ia_id':ia,'books':stats,'complete_words':len(complete.split())},indent=2),encoding='utf-8')
          print(json.dumps(stats,indent=2))
          PY
      - name: Commit fetched source
        run: |
          git config user.name 'Zyel Source Bot'
          git config user.email 'source-bot@zyel.io'
          git add zosimus-source
          git commit -m 'Fetch Zosimus 1814 public-domain source' || exit 0
          git push
